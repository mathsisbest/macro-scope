# Declarative list of what the platform tracks.
# Edit this file to change coverage — no code changes needed.

crypto:            # CoinGecko ids
  - bitcoin
  - ethereum
  - solana

equities:          # Broad-market ETFs ONLY — deliberately no single names. Keeps the portfolio
                   # an asset-CLASS allocation story and avoids double-counting a factor (e.g. tech
                   # beta loaded by SPY + QQQ + individual mega-caps) in the covariance solvers.
  - SPY            # S&P 500 ETF
  - QQQ            # Nasdaq 100 ETF
  - VEA            # Developed ex-US equities (inception 2007)

bonds:             # Yahoo — fixed-income ETFs (total return via adjusted close)
  - TLT            # 20+yr US Treasuries
  - TIP            # US TIPS (inception 2003)

commodities:       # Yahoo — commodity ETFs
  - GLD            # Gold (inception 2004)

fx:                # Yahoo FX pairs (fetched as e.g. EURUSD=X)
  - EURUSD
  - GBPUSD

crypto_daily:      # Yahoo daily crypto — long history for the portfolio backtest (distinct from
  - BTC-USD        # the CoinGecko intraday path). BTC-USD lands as symbol 'BTC', asset_class 'crypto'.

macro:             # FRED series ids
  - { id: CPIAUCSL, label: "US CPI (all items)" }
  - { id: UNRATE,   label: "US Unemployment Rate" }
  - { id: DGS10,    label: "US 10Y Treasury Yield" }
  - { id: DGS2,     label: "US 2Y Treasury Yield" }
  - { id: FEDFUNDS, label: "Effective Fed Funds Rate" }

worldbank:         # World Bank indicator codes (global context)
  - { id: "NY.GDP.MKTP.KD.ZG", label: "GDP growth (annual %)" }
  - { id: "FP.CPI.TOTL.ZG",    label: "Inflation, consumer prices (annual %)" }
