# Declarative list of what the platform tracks.
# Edit this file to change coverage — no code changes needed.

equities:          # Broad-market ETFs ONLY — deliberately no single names. Keeps the portfolio
                   # an asset-CLASS allocation story and avoids double-counting a factor (e.g. tech
                   # beta loaded by SPY + QQQ + individual mega-caps) in the covariance solvers.
  - SPY            # S&P 500 ETF
  - QQQ            # Nasdaq 100 ETF
  - VEA            # Developed ex-US equities (inception 2007)

bonds:             # Yahoo — fixed-income ETFs (total return via adjusted close)
  - TLT            # 20+yr US Treasuries
  - TIP            # US TIPS (inception 2003)

commodities:       # Yahoo — commodity ETFs
  - GLD            # Gold (inception 2004)

fx:                # Yahoo FX pairs (fetched as e.g. EURUSD=X)
  - EURUSD
  - GBPUSD

crypto_daily:      # Yahoo daily crypto — the ONLY crypto path; long history for the portfolio
  - BTC-USD        # backtest. BTC-USD lands as symbol 'BTC', asset_class 'crypto'.

macro:             # FRED series — { id, label, category, units }. Adding a line is all it takes:
                   # the FRED extractor reads only `id`; the dashboard groups the Macro tab by `category`.
  # Growth & activity
  - { id: A191RL1Q225SBEA, label: "Real GDP growth",       category: "Growth & activity", units: "% annualised" }
  - { id: INDPRO,          label: "Industrial production",  category: "Growth & activity", units: "index" }
  - { id: RSAFS,           label: "Retail sales",           category: "Growth & activity", units: "$ millions" }
  - { id: UMCSENT,         label: "Consumer sentiment",     category: "Growth & activity", units: "index" }
  # Inflation
  - { id: CPIAUCSL,        label: "US CPI (all items)",     category: "Inflation",         units: "index" }
  - { id: PCEPILFE,        label: "Core PCE price index",   category: "Inflation",         units: "index" }
  # Labor
  - { id: UNRATE,          label: "Unemployment rate",      category: "Labor",             units: "%" }
  - { id: PAYEMS,          label: "Nonfarm payrolls",       category: "Labor",             units: "thousands" }
  - { id: ICSA,            label: "Initial jobless claims", category: "Labor",             units: "claims" }
  # Rates & curve
  - { id: DGS10,           label: "10Y Treasury yield",     category: "Rates & curve",     units: "%" }
  - { id: DGS2,            label: "2Y Treasury yield",      category: "Rates & curve",     units: "%" }
  - { id: DGS3MO,          label: "3M Treasury yield",      category: "Rates & curve",     units: "%" }
  - { id: T10Y2Y,          label: "10Y-2Y spread",          category: "Rates & curve",     units: "pp" }
  - { id: FEDFUNDS,        label: "Fed funds rate",         category: "Rates & curve",     units: "%" }
  # Fiscal
  - { id: GFDEGDQ188S,     label: "Federal debt / GDP",     category: "Fiscal",            units: "% of GDP" }
  # Money & liquidity
  - { id: M2SL,            label: "M2 money supply",        category: "Money & liquidity", units: "$ billions" }
  - { id: WALCL,           label: "Fed balance sheet",      category: "Money & liquidity", units: "$ millions" }
  # Risk & conditions
  - { id: VIXCLS,          label: "VIX (equity volatility)", category: "Risk & conditions", units: "index" }
  - { id: NFCI,            label: "Financial conditions (NFCI)", category: "Risk & conditions", units: "index" }
  - { id: SAHMREALTIME,    label: "Sahm rule",              category: "Risk & conditions", units: "pp" }
  # Commodities & FX
  - { id: DCOILWTICO,      label: "WTI crude oil",          category: "Commodities & FX",  units: "$/barrel" }
  - { id: DTWEXBGS,        label: "Broad dollar index",     category: "Commodities & FX",  units: "index" }

worldbank:         # World Bank indicator codes (global context)
  - { id: "NY.GDP.MKTP.KD.ZG", label: "GDP growth (annual %)" }
  - { id: "FP.CPI.TOTL.ZG",    label: "Inflation, consumer prices (annual %)" }
