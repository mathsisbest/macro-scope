name: CI

on:
  # The job mirrors `make ci`. Runs on PRs to main — but NOT on draft PRs (only once you
  # mark "ready for review", see the job `if:` guard) and NOT on docs-only changes (paths-ignore).
  # Still manually triggerable. `make ci` remains the local pre-flight before you open the PR.
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  # Cancel superseded runs on the same branch to save Actions minutes.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    # Skip draft PRs; always run on manual dispatch.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      # CI is fully local + token-free: a local DuckDB file with deterministic seeded data.
      # MotherDuck + LLM keys are forced empty so use_motherduck stays False and `mmi ai`
      # uses its deterministic-template fallback (matches the Makefile CI_ENV).
      MMI_DUCKDB_PATH: ${{ github.workspace }}/data/ci.duckdb
      MMI_MOTHERDUCK_DATABASE: ""
      MOTHERDUCK_TOKEN: ""
      GEMINI_API_KEY: ""
      GROQ_API_KEY: ""
      ANTHROPIC_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (ml + dashboard + transform + dev)
        run: python -m pip install -e ".[ml,dashboard,transform,dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type check (mypy)
        run: mypy
      - name: Seed deterministic local data
        run: mmi seed
      - name: Backtest portfolio strategies (lands raw.portfolio_returns)
        run: mmi portfolio
      - name: Reset marts/staging so dbt is the sole producer
        run: python -c "import duckdb, os; c = duckdb.connect(os.environ['MMI_DUCKDB_PATH']); c.execute('drop schema if exists marts cascade'); c.execute('drop schema if exists staging cascade'); c.close()"
      - name: dbt build + test (canonical transform, local DuckDB)
        run: dbt build --project-dir transform --profiles-dir transform --target dev
      - name: Train + score ML models (lands marts.model_metrics)
        run: mmi ml
      - name: Generate GenAI market brief (deterministic fallback, no keys)
        run: mmi ai
      - name: Dashboard read-path smoke (core marts accessors)
        run: PYTHONPATH=. python scripts/dashboard_smoke.py
      - name: Dashboard app-render smoke
        run: PYTHONPATH=. python scripts/dashboard_app_smoke.py
      - name: Public import smoke (clean-room install)
        run: python scripts/public_import_smoke.py
      - name: Tests
        run: pytest
