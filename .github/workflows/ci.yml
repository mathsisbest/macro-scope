name: CI

on:
  # Manual-only: local `make ci` is the gate (this preserves the free GitHub Actions tier).
  # The job below mirrors `make ci`; re-add `pull_request:` / `push:` here to restore hosted CI.
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      # CI is fully local + token-free: a local DuckDB file with deterministic seeded data.
      # MotherDuck vars are forced empty so use_motherduck stays False even if they leak in.
      MMI_DUCKDB_PATH: ${{ github.workspace }}/data/ci.duckdb
      MMI_MOTHERDUCK_DATABASE: ""
      MOTHERDUCK_TOKEN: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (ml + dashboard + transform + dev)
        run: python -m pip install -e ".[ml,dashboard,transform,dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type check (mypy)
        run: mypy
      - name: Seed deterministic local data
        run: mmi seed
      - name: Reset marts/staging so dbt is the sole producer
        run: python -c "import duckdb, os; c = duckdb.connect(os.environ['MMI_DUCKDB_PATH']); c.execute('drop schema if exists marts cascade'); c.execute('drop schema if exists staging cascade'); c.close()"
      - name: dbt build + test (canonical transform, local DuckDB)
        run: dbt build --project-dir transform --profiles-dir transform --target dev
      - name: Dashboard read-path smoke (core marts accessors)
        run: PYTHONPATH=. python scripts/dashboard_smoke.py
      - name: Tests
        run: pytest
