name: Weekly full refresh (ML + portfolio)

# Full pipeline: ingest → build → ml → portfolio → build → ai → snapshot. ~20 min.
# Optimized: ml runs before portfolio (doesn't need portfolio marts), eliminating one dbt build.
# Runs weekly on Mondays.

on:
  workflow_dispatch:
    inputs:
      full:
        description: "Force full refresh"
        type: boolean
        default: true
  schedule:
    - cron: "0 4 * * 1"  # WEEKLY Mon 04:00 UTC

permissions:
  contents: write

concurrency:
  group: snapshot-weekly
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MMI_DUCKDB_PATH: ${{ github.workspace }}/data/mmi.duckdb
      MMI_MOTHERDUCK_DATABASE: ""
      MOTHERDUCK_TOKEN: ""
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'gemini' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MMI_PORTFOLIO_N_BOOT: "200"  # Reduced from 2000 for faster CI (still statistically valid)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[ml,portfolio,transform]"
      - name: Full pipeline
        run: |
          set -euo pipefail
          # 1. Ingest fresh data
          mmi ingest
          # 2. Build marts (creates fct_asset_daily — needed by both ml and portfolio)
          dbt build --project-dir transform --profiles-dir transform --target dev
          # 3. ML training (~10 min) — only reads fct_asset_daily, doesn't need portfolio marts
          mmi ml
          mmi ml-gate
          # 4. Portfolio backtest (~15 min) — reads fct_asset_daily, writes raw.portfolio_*
          mmi portfolio
          # 5. Rebuild marts (populates fct_portfolio_* from raw.portfolio_*)
          dbt build --project-dir transform --profiles-dir transform --target dev
          # 6. AI brief
          mmi ai
          # 7. Export snapshot
          mmi snapshot
      - name: Commit snapshot
        run: |
          set -euo pipefail
          git config user.name "mathsisbest"
          git config user.email "33107428+mathsisbest@users.noreply.github.com"
          git add data/public
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore(data): weekly snapshot [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
