repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        # 8 MB per file — above any single real snapshot mart (the full 24-year data/public
        # snapshot is ~5.7 MB total); the total-snapshot cap is enforced in `mmi snapshot`.
        args: [--maxkb=8000]
      - id: detect-private-key
