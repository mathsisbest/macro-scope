version: 2

models:
  - name: stg_asset_prices
    description: "Typed daily OHLCV per asset."
    columns:
      - name: symbol
        tests: [not_null]
      - name: close
        tests: [not_null]
  - name: stg_macro_series
    description: "Typed FRED observations (nulls dropped)."
    columns:
      - name: series_id
        tests: [not_null]
  - name: stg_worldbank
    description: "Typed World Bank indicator values."
    columns:
      - name: indicator_id
        tests: [not_null]
