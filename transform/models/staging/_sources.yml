version: 2

sources:
  - name: raw
    description: "Landing tables written by the ingestion layer (src/mmi/ingestion)."
    schema: raw
    tables:
      - name: asset_prices
        description: "Daily OHLCV for equities/ETFs/FX + daily BTC, from Yahoo (adjusted close = total return)."
        loaded_at_field: loaded_at
        freshness:
          warn_after: { count: 2, period: day }
          error_after: { count: 7, period: day }
      - name: macro_series
        description: "FRED macro observations."
      - name: worldbank
        description: "World Bank cross-country indicators."
      - name: pipeline_runs
        description: "Ingestion audit log (run_id, rows, status, timings)."
      - name: portfolio_returns
        description: "Per-strategy daily portfolio returns, computed by `mmi portfolio` (backtest)."
      - name: portfolio_strategy_stats
        description: "Per-strategy Sharpe + bootstrap CIs, computed by `mmi portfolio`."
      - name: portfolio_strategy_pairs
        description: "Pairwise Sharpe-difference bootstrap CIs, computed by `mmi portfolio`."
      - name: portfolio_attribution
        description: "Per-(strategy, symbol) return + risk contribution, computed by `mmi portfolio`."
      - name: portfolio_ml_gate
        description: "Per-rebalance ML forecast skill + the weight it earns in mvo_ml, by `mmi portfolio`."
      - name: portfolio_btc_effect
        description: "Paired cross-window BTC effect (Sharpe inc_btc_2015 - ex_btc_2015) per strategy, by `mmi portfolio`."
