version: 2

models:
  - name: dim_asset
    description: "One row per tracked asset (equities, bonds, commodities, FX, crypto)."
    columns:
      - name: symbol
        tests: [not_null, unique]
      - name: asset_class
        tests:
          - not_null
          - accepted_values: { values: ["equities", "bonds", "commodities", "fx", "crypto"] }

  - name: fct_asset_daily
    description: "Daily OHLCV + simple return, rolling 20d vol and 50d MA per asset."
    columns:
      - name: symbol
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: daily_return
        description: "Simple daily return; sanity-bounded by a singular test."

  - name: fct_crypto_intraday
    description: "Crypto snapshots with snapshot-over-snapshot pct change."
    columns:
      - name: symbol
        tests: [not_null]
      - name: ts
        tests: [not_null]

  - name: fct_macro_indicator
    description: "Macro series values with period-over-period change."
    columns:
      - name: series_id
        tests: [not_null]
      - name: date
        tests: [not_null]

  - name: fct_market_macro
    description: "SPY joined (ASOF) to 10Y/2Y yields and the 10Y-2Y curve."
    columns:
      - name: date
        tests: [not_null, unique]

  - name: fct_portfolio_returns
    description: "Per-strategy daily portfolio returns + drawdown + rolling 252d Sharpe (from raw.portfolio_returns; grain (window_id, strategy, date) asserted by a singular test)."
    columns:
      - name: window_id
        tests:
          - not_null
          - accepted_values:
              values: ["ex_btc_2002", "ex_btc_2015", "inc_btc_2015"]
      - name: strategy
        tests:
          - not_null
          - accepted_values:
              values:
                ["equal_weight", "inverse_vol", "risk_parity", "sixty_forty", "mvo_histmean", "mvo_ml"]
      - name: date
        tests: [not_null]

  - name: fct_portfolio_strategy_stats
    description: "Per-strategy annualised Sharpe with stationary block-bootstrap confidence intervals (uncertainty quantification). Grain: (window_id, strategy), asserted by a singular test."
    columns:
      - name: window_id
        tests:
          - not_null
          - accepted_values:
              values: ["ex_btc_2002", "ex_btc_2015", "inc_btc_2015"]
      - name: strategy
        tests:
          - not_null
          - accepted_values:
              values:
                ["equal_weight", "inverse_vol", "risk_parity", "sixty_forty", "mvo_histmean", "mvo_ml"]

  - name: fct_portfolio_strategy_pairs
    description: "Pairwise bootstrap Sharpe-difference CIs; distinguishable = the difference CI excludes zero. Grain: (window_id, strategy_a, strategy_b), asserted by a singular test."
    columns:
      - name: window_id
        tests:
          - not_null
          - accepted_values:
              values: ["ex_btc_2002", "ex_btc_2015", "inc_btc_2015"]
      - name: strategy_a
        tests: [not_null]
      - name: strategy_b
        tests: [not_null]
      - name: distinguishable
        tests: [not_null]

  - name: fct_performance_attribution
    description: "Per-(window_id, strategy, symbol) contribution to return + to realised variance; a '(costs)' row carries the cost drag. A singular test asserts the per-asset return contributions reconcile to the strategy's gross return (per window)."
    columns:
      - name: window_id
        tests:
          - not_null
          - accepted_values:
              values: ["ex_btc_2002", "ex_btc_2015", "inc_btc_2015"]
      - name: strategy
        tests: [not_null]
      - name: symbol
        tests: [not_null]

  - name: fct_portfolio_regime_performance
    description: "Each strategy's annualised return / vol / Sharpe conditioned on the market volatility regime (SPY 20d-vol terciles, matching ml.regime). Grain: (window_id, strategy, regime)."
    columns:
      - name: window_id
        tests:
          - not_null
          - accepted_values:
              values: ["ex_btc_2002", "ex_btc_2015", "inc_btc_2015"]
      - name: strategy
        tests: [not_null]
      - name: regime
        tests:
          - not_null
          - accepted_values: { values: ["Low", "Medium", "High"] }

  - name: fct_portfolio_ml_gate
    description: "Per-rebalance ML gate: forecast out-of-sample skill vs the prior + the weight (lambda) the forecast earns in mvo_ml's mu blend. A low forecast_weight is why mvo_ml ≈ mvo_histmean. Grain: (window_id, date), asserted by a singular test."
    columns:
      - name: window_id
        tests:
          - not_null
          - accepted_values:
              values: ["ex_btc_2002", "ex_btc_2015", "inc_btc_2015"]
      - name: date
        tests: [not_null]

  - name: fct_portfolio_btc_effect
    description: "Paired cross-window BTC effect: Sharpe(inc_btc_2015) − Sharpe(ex_btc_2015) per strategy, with a paired block-bootstrap CI. Grain: one row per strategy. A singular test re-derives diff + distinguishable."
    columns:
      - name: strategy
        tests:
          - not_null
          - unique
          - accepted_values:
              values:
                ["equal_weight", "inverse_vol", "risk_parity", "sixty_forty", "mvo_histmean", "mvo_ml"]
      - name: distinguishable
        tests: [not_null]
