version: 2

models:
  - name: dim_asset
    description: "One row per tracked asset (equities, bonds, commodities, FX, crypto)."
    columns:
      - name: symbol
        tests: [not_null, unique]
      - name: asset_class
        tests:
          - not_null
          - accepted_values: { values: ["equities", "bonds", "commodities", "fx", "crypto"] }

  - name: fct_asset_daily
    description: "Daily OHLCV + simple return, rolling 20d vol and 50d MA per asset."
    columns:
      - name: symbol
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: daily_return
        description: "Simple daily return; sanity-bounded by a singular test."

  - name: fct_crypto_intraday
    description: "Crypto snapshots with snapshot-over-snapshot pct change."
    columns:
      - name: symbol
        tests: [not_null]
      - name: ts
        tests: [not_null]

  - name: fct_macro_indicator
    description: "Macro series values with period-over-period change."
    columns:
      - name: series_id
        tests: [not_null]
      - name: date
        tests: [not_null]

  - name: fct_market_macro
    description: "SPY joined (ASOF) to 10Y/2Y yields and the 10Y-2Y curve."
    columns:
      - name: date
        tests: [not_null, unique]

  - name: fct_portfolio_returns
    description: "Per-strategy daily portfolio returns + drawdown + rolling 252d Sharpe (from raw.portfolio_returns; grain (strategy, date) asserted by a singular test)."
    columns:
      - name: strategy
        tests:
          - not_null
          - accepted_values:
              values: ["equal_weight", "inverse_vol", "risk_parity", "sixty_forty"]
      - name: date
        tests: [not_null]

  - name: fct_portfolio_strategy_stats
    description: "Per-strategy annualised Sharpe with stationary block-bootstrap confidence intervals (uncertainty quantification). Grain: one row per strategy."
    columns:
      - name: strategy
        tests:
          - not_null
          - unique
          - accepted_values:
              values: ["equal_weight", "inverse_vol", "risk_parity", "sixty_forty"]

  - name: fct_portfolio_strategy_pairs
    description: "Pairwise bootstrap Sharpe-difference CIs; distinguishable = the difference CI excludes zero. Grain: one row per unordered strategy pair."
    columns:
      - name: strategy_a
        tests: [not_null]
      - name: strategy_b
        tests: [not_null]
      - name: distinguishable
        tests: [not_null]

  - name: fct_performance_attribution
    description: "Per-(strategy, symbol) contribution to return + to realised variance; a '(costs)' row carries the cost drag. A singular test asserts the per-asset return contributions reconcile to the strategy's gross return."
    columns:
      - name: strategy
        tests: [not_null]
      - name: symbol
        tests: [not_null]
