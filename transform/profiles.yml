# dbt connects to DuckDB. Two targets:
#   dev  (default) — local DuckDB file; used by CI and the offline demo. No secrets.
#   prod           — MotherDuck (the deployed shared store); token from MOTHERDUCK_TOKEN env.
# CI/local use the default `dev`; the scheduled cron passes `--target prod`.
# When run with --project-dir from the repo root, set an ABSOLUTE MMI_DUCKDB_PATH.
mmi:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('MMI_DUCKDB_PATH', '../data/mmi.duckdb') }}"
      schema: main
      threads: 4
    prod:
      type: duckdb
      # MotherDuck. The token is injected from the environment at runtime via env_var —
      # it is never stored in this file or printed.
      path: "md:{{ env_var('MMI_MOTHERDUCK_DATABASE', 'mmi') }}?motherduck_token={{ env_var('MOTHERDUCK_TOKEN') }}"
      schema: main
      threads: 4
